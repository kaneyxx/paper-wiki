name: Test Plugin Installation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin and marketplace manifests
        run: claude plugin validate .

  test-install:
    name: Test plugin installation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git for HTTPS clones
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Add marketplace
        run: claude plugin marketplace add ./

      - name: List marketplaces
        run: claude plugin marketplace list

      - name: Install plugin
        run: claude plugin install paper-wiki@paper-wiki --scope user
