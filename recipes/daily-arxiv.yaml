# daily-arxiv recipe — pull yesterday's arXiv submissions, filter for the
# user's topics, dedup against the Obsidian vault, and write a digest to
# both a plain Markdown directory and the vault's daily folder.
#
# Edit the topics, vault paths, and category list to match your setup.

name: daily-arxiv

sources:
  - name: arxiv
    config:
      categories:
        - cs.AI
        - cs.LG
        - cs.CL
        - cs.CV
      lookback_days: 1
      max_results: 200

filters:
  - name: recency
    config:
      max_days: 1
  - name: relevance
    config:
      topics:
        - name: vision-language
          keywords:
            - vision-language
            - vision language model
            - multimodal
            - foundation model
          categories:
            - cs.CV
            - cs.LG
        - name: agents
          keywords:
            - agent
            - tool use
            - reasoning
          categories:
            - cs.AI
            - cs.MA
  - name: dedup
    config:
      vault_paths:
        # Replace with your vault's source-papers directory before use.
        # Johnny.Decimal / PARA users can swap this for e.g.
        # `~/Documents/MyVault/20_Research/Papers`.
        - <EDIT_ME_BEFORE_USE>

scorer:
  name: composite
  config:
    topics:
      - name: vision-language
        keywords:
          - vision-language
          - vision language model
          - multimodal
          - foundation model
        categories:
          - cs.CV
          - cs.LG
      - name: agents
        keywords:
          - agent
          - tool use
          - reasoning
        categories:
          - cs.AI
          - cs.MA
    weights:
      relevance: 0.40
      novelty: 0.20
      momentum: 0.30
      rigor: 0.10
    momentum_full_citations: 100
    recency_full_days: 7

reporters:
  - name: markdown
    config:
      # Replace with the directory you want plain-Markdown digests in.
      output_dir: <EDIT_ME_BEFORE_USE>
  - name: obsidian
    config:
      # Replace with your Obsidian vault root before use. The runner
      # fails loud if this placeholder reaches it, which is intentional
      # — bundled defaults must never silently write into a real vault.
      vault_path: <EDIT_ME_BEFORE_USE>
      # Override to "10_Daily" if you use Johnny.Decimal / PARA numbering.
      daily_subdir: Daily
      # Opt in to the wiki backend: each top-K paper is also written to
      # `Wiki/papers/<canonical-id>.md` so /paper-wiki:wiki-ingest can
      # fold it into your concept articles. Off by default to avoid
      # touching first-time-user vaults.
      # wiki_backend: true

top_k: 10
# Auto-chain ``/paper-wiki:wiki-ingest`` for the top-N papers right
# after the digest finishes. ``0`` (the default) means no chaining
# — invoke wiki-ingest manually per-paper. Set to 3 to fold the
# top-3 ranked papers into your concept articles every morning;
# the wiki-ingest step is idempotent so safe to re-run on the
# same recommendations. Hard upper bound is 20.
# auto_ingest_top: 3
